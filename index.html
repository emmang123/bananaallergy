<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e18" />
  <title>바나나 알러지 앰망진창</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/bananaallergy/assets/index-C-EkSzfA.js"></script>
  <link rel="stylesheet" crossorigin href="/bananaallergy/assets/index-CG6ISUmJ.css">
</head>
<body>
  <div id="app">
    <div id="stage">

      <!-- ── 3D Canvas ─────────────────────────────────────────────────────── -->
      <canvas id="game-canvas"></canvas>

      <!-- ── In-game UI overlay ─────────────────────────────────────────────── -->
      <div id="ui-overlay" class="hidden">

        <!-- Top icon buttons -->
        <button class="icon-btn icon-btn--left icon-btn--stats" id="btn-stats" aria-label="stats"></button>
        <button class="icon-btn icon-btn--right" id="btn-pause"    aria-label="pause">☰</button>

        <!-- HUD: score + section -->
        <div class="hud-top">
          <div class="panel score-panel">
            <div class="panel-label">◆ 점수 ◆</div>
            <div class="panel-value" id="score-value">000000</div>
          </div>
          <div class="panel diamond-panel">
            <span>💎</span>
            <span id="run-dia-value">0</span>
          </div>
          <div class="panel section-panel">
            <span id="section-label">SEC 1</span>
          </div>
        </div>

        <!-- HP bar -->
        <div id="hp-bar-wrap">
          <div id="hp-bar-bg">
            <div id="hp-fill"></div>
          </div>
          <div id="hp-text">100/100</div>
        </div>

        <!-- Progress bar (thin, bottom of screen) -->
        <div id="progress-bar-bg">
          <div id="run-progress"></div>
        </div>

        <!-- Toast -->
        <div id="toast"></div>

        <!-- Mobile joystick -->
        <div id="joystick" class="hidden">
          <div id="joyBase">
            <div id="joyKnob"></div>
          </div>
        </div>
        <button id="touch-left" class="touch-arrow touch-arrow-left hidden" aria-label="left">‹</button>
        <button id="touch-right" class="touch-arrow touch-arrow-right hidden" aria-label="right">›</button>

      </div><!-- /ui-overlay -->

      <!-- ── Title screen ──────────────────────────────────────────────────── -->
      <div id="screen-title" class="screen">
        <div class="screen-version">v0.03</div>
        <div class="studio-credit">내떡진 게임즈</div>
        <div class="screen-inner">
          <div class="game-logo">
            <div class="logo-main">바나나 알러지</div>
            <div class="logo-sub">앰망진창</div>
          </div>
          <div class="login-box">
            <div class="login-row">
              <label class="login-label">닉네임</label>
              <input id="inp-nick" class="login-input" type="text" maxlength="10"
                     placeholder="닉네임" autocomplete="off" spellcheck="false"/>
            </div>
            <div class="login-row">
              <label class="login-label">코드</label>
              <input id="inp-code" class="login-input" type="text" maxlength="6"
                     placeholder="0000" autocomplete="off" spellcheck="false"/>
            </div>
            <div class="login-actions">
              <button id="btn-new-game" class="pixel-btn btn-gold">새로하기</button>
              <button id="btn-continue" class="pixel-btn btn-silver">이어하기</button>
            </div>
            <div class="login-hint">* 닉네임+코드 일치 시 저장 데이터 사용</div>
          </div>
        </div>
      </div>

      <!-- ── Main menu ──────────────────────────────────────────────────────── -->
      <div id="screen-menu" class="screen hidden">
        <div class="screen-version">v0.03</div>
        <div class="studio-credit">내떡진 게임즈</div>
        <div class="screen-inner menu-inner">
          <div class="menu-profile">
            <span id="menu-nick">-</span>
            <span class="dia-badge">💎 <span id="menu-dia">0</span></span>
          </div>
          <div class="menu-best">최고점수: <span id="menu-best">0</span></div>
          <div class="menu-btns">
            <button id="btn-play"    class="pixel-btn btn-gold">플레이</button>
            <button id="btn-upgrade" class="pixel-btn btn-silver">영구 강화</button>
            <button id="btn-ranking" class="pixel-btn btn-silver">랭킹 보기</button>
            <button id="btn-logout"  class="pixel-btn btn-dark">로그아웃</button>
          </div>
        </div>
      </div>

      <!-- ── Upgrade screen ─────────────────────────────────────────────────── -->
      <div id="screen-upgrade" class="screen hidden">
        <div class="screen-inner upgrade-inner">
          <div class="upgrade-header">
            <button id="btn-upgrade-back" class="pixel-btn btn-dark btn-small">◀ 뒤로</button>
            <div class="upgrade-title">영구 강화</div>
            <div class="upgrade-dia">💎 <span id="upgrade-dia">0</span></div>
          </div>
          <div id="upgrade-grid" class="upgrade-grid"></div>
        </div>
      </div>

    </div><!-- /stage -->
  </div>

</body>
</html>
